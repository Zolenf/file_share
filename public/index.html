<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCI File Share</title>
  <style>
    :root {
      --bg-color: #1e1e2e;
      --surface-color: #313244;
      --text-color: #cdd6f4;
      --accent-color: #89b4fa;
      --border-color: #45475a;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 3rem 1rem;
      box-sizing: border-box;
    }

    .container {
      background-color: var(--surface-color);
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin-top: 0;
      color: var(--accent-color);
      text-align: center;
      font-size: 1.8rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    input[type="file"] {
      padding: 1rem;
      background: var(--bg-color);
      border: 2px dashed var(--border-color);
      border-radius: 8px;
      color: var(--text-color);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    input[type="file"]:hover {
      border-color: var(--accent-color);
    }

    button {
      background-color: var(--accent-color);
      color: var(--bg-color);
      border: none;
      padding: 0.8rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    hr {
      border: none;
      height: 1px;
      background-color: var(--border-color);
      margin: 2rem 0;
    }

    h3 {
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    li {
      background: var(--bg-color);
      padding: 0.8rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    a {
      color: var(--text-color);
      text-decoration: none;
      display: flex;
      align-items: center;
      word-break: break-all;
      transition: color 0.2s;
    }

    a:hover {
      color: var(--accent-color);
    }

    /* Ikonka obok linku do pobrania */
    a::before {
      content: "📄";
      margin-right: 10px;
      font-size: 1.2em;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>SCI File Share</h1>

    <form action="/api/upload" method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required>
      <button type="submit">Wrzuć plik</button>
    </form>

    <hr>

    <h3>Dostępne pliki:</h3>
    <ul id="file-list">
      <li>Ładowanie listy...</li>
    </ul>
  </div>

  <script nonce="">
    fetch('/api/fetch')
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('file-list');

        // Zabezpieczenie przed brakiem plików (gdy odpowiedź ma pustą tablicę blobs)
        if (!data.blobs || data.blobs.length === 0) {
          list.innerHTML = '<li>Brak plików w bazie.</li>';
          return;
        }

        // Mapowanie zwróconych plików na estetyczne linki
        list.innerHTML = data.blobs.map(plik =>
          `<li><a href="${plik.url}" download>${plik.pathname}</a></li>`
        ).join('');
      })
      .catch(error => {
        document.getElementById('file-list').innerHTML = '<li>Błąd połączenia z bazą.</li>';
      });
  </script>
</body>

</html>
